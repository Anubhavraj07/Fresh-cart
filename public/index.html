<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FreshCart — Premium online grocery shopping. Browse fresh produce, dairy, bakery, beverages, and snacks. Add to cart and order with ease.">
  <title>FreshCart — Fresh Groceries Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Ambient Background ────────────────────────────── -->
  <div class="ambient-bg">
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <canvas class="ambient-canvas" id="ambient-canvas"></canvas>
  </div>
  <div class="noise-overlay"></div>

  <!-- ─── Navigation ──────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#/" class="nav-logo" id="nav-logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Fresh<span class="logo-accent">Cart</span></span>
      </a>
      <div class="nav-search" id="nav-search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search groceries..." autocomplete="off">
      </div>
      <div class="nav-actions">
        <a href="#/orders" class="nav-link" id="nav-orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 14l2 2 4-4"/>
          </svg>
          <span>Orders</span>
        </a>
        <a href="#/cart" class="nav-cart-btn" id="nav-cart-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span>Cart</span>
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- ─── Main Content ────────────────────────────────── -->
  <main class="main-content" id="app">
    <!-- Pages rendered here by JS router -->
  </main>

  <!-- ─── Toast Notification ──────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ─── Scripts ─────────────────────────────────────── -->
  <script src="/js/api.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/checkout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
